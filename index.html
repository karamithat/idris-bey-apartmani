<!doctype html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>İdris Bey Apartmanı</title>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Print Stilleri -->
<style>
  @media print {
    /* Sadece makbuz içeriğini göster */
    body * {
      visibility: hidden;
    }
    
    .makbuz-content,
    .makbuz-content * {
      visibility: visible !important;
    }
    
    /* Modal arka planını gizle */
    .fixed {
      position: static !important;
      background: white !important;
    }
    
    /* Butonları gizle */
    button {
      display: none !important;
    }
    
    /* Sadece makbuz içeriğini göster */
    .makbuz-content {
      position: absolute;
      left: 0;
      top: 0;
      width: 100%;
      padding: 1cm !important;
    }
    
    /* Tek sayfaya sığdır */
    @page {
      size: A4;
      margin: 1cm;
    }
    
    /* Sayfa kırılmalarını engelle */
    .makbuz-content > div {
      page-break-inside: avoid;
    }
    
    /* Modal padding'i kaldır */
    .p-4, .p-8 {
      padding: 0 !important;
    }
  }
  
  /* Modal scroll fix */
  .fixed.inset-0 {
    overflow-y: auto;
  }
</style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
